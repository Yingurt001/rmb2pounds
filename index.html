<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMB → £ 汇率监测 · 什么时候换英镑划算</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg1:#1b1033; --bg2:#3a1c5a; --card:rgba(255,255,255,.06);
    --pink:#ff7eb3; --purple:#9d7bff; --green:#41e0a3; --yellow:#ffd166; --red:#ff6b6b;
    --txt:#f4eeff; --sub:#b9aee0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--txt);min-height:100vh;padding:24px 16px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header{text-align:center;margin-bottom:8px}
  header h1{font-size:20px;font-weight:600;letter-spacing:.5px}
  header p{color:var(--sub);font-size:13px;margin-top:4px}
  .card{background:var(--card);border:1px solid rgba(255,255,255,.08);
    border-radius:20px;padding:24px;margin-top:18px;backdrop-filter:blur(10px);
    box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .hero{text-align:center}
  .rate{font-size:56px;font-weight:700;line-height:1;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .rate small{font-size:18px;color:var(--sub);-webkit-text-fill-color:var(--sub)}
  .badge{display:inline-block;margin-top:14px;padding:8px 18px;border-radius:999px;font-weight:600;font-size:15px}
  .delta{margin-top:10px;color:var(--sub);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  .stat{background:rgba(255,255,255,.05);border-radius:14px;padding:14px;text-align:center}
  .stat .k{font-size:12px;color:var(--sub)}
  .stat .v{font-size:20px;font-weight:600;margin-top:4px}
  .score-wrap{margin-top:18px}
  .score-bar{height:14px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:8px}
  .score-fill{height:100%;border-radius:999px;transition:width .6s ease}
  .row{display:flex;justify-content:space-between;align-items:center}
  .target-box{margin-top:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .target-box label{font-size:14px;color:var(--sub)}
  .target-box input{width:90px;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.2);color:var(--txt);font-size:16px;text-align:center}
  .btn{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:600;
    background:linear-gradient(90deg,var(--pink),var(--purple));color:#fff}
  canvas{margin-top:6px}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:24px;line-height:1.7}
  a{color:var(--pink)}
  .loading{text-align:center;color:var(--sub);padding:30px}
  .sect-title{font-size:16px;font-weight:600;margin-bottom:4px}
  .rec{background:rgba(65,224,163,.12);border:1px solid rgba(65,224,163,.3);
    border-radius:14px;padding:14px;margin-top:14px;font-size:15px;line-height:1.6}
  .prob{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
  .prob .box{background:rgba(255,255,255,.05);border-radius:14px;padding:16px 10px;text-align:center}
  .prob .h{font-size:12px;color:var(--sub)}
  .prob .p{font-size:26px;font-weight:700;margin-top:6px;
    background:linear-gradient(90deg,var(--pink),var(--purple));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .prob .m{font-size:11px;color:var(--sub);margin-top:4px}
  .note{font-size:12px;color:var(--sub);margin-top:14px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>💷 人民币 → 英镑 · 换汇时机</h1>
    <p>越低越划算 · 实时价 ECB · 预测=蒙特卡洛概率(非点位)</p>
  </header>

  <div class="card hero" id="hero"><div class="loading">读取汇率中…</div></div>

  <div class="card">
    <div class="row"><b class="sect-title">🔮 模型预测 · 等下去会怎样</b><span id="genLabel" style="color:var(--sub);font-size:12px"></span></div>
    <div id="forecast"><div class="loading">读取模型预测中…</div></div>
    <canvas id="fanChart" height="190"></canvas>
    <div class="note" id="btNote"></div>
  </div>

  <footer>
    扇形=未来路径分布(深=50%可能区间, 浅=80%), 绿虚线=你的目标价。<br>
    <b>实时盯盘 + Apple Watch 提醒</b>由本地监测器负责(北京 7:00–23:00 跌破目标价震手表)。<br>
    汇率方向短期不可预测; 本工具量化概率与区间, 不构成投资建议。
  </footer>
</div>

<script>
const TARGET_KEY='rmb2p_target';
let target=parseFloat(localStorage.getItem(TARGET_KEY))||9.03;
let fanChart;
const fmt=(n,d=4)=>Number(n).toFixed(d);
const dstr=dt=>dt.toISOString().slice(0,10);

// ---- 顶部实时卡 (ECB latest + 近30天划算度) ----
async function loadHero(){
  const today=new Date(),past=new Date();past.setDate(past.getDate()-40);
  let hist;
  try{hist=await(await fetch(`https://api.frankfurter.dev/v1/${dstr(past)}..${dstr(today)}?from=GBP&to=CNY`)).json();}
  catch(e){document.getElementById('hero').innerHTML='<div class="loading">网络读取失败，稍后刷新</div>';return;}
  const rows=Object.entries(hist.rates).map(([d,v])=>({d,v:v.CNY})).sort((a,b)=>a.d<b.d?-1:1);
  const vals=rows.map(r=>r.v),price=vals.at(-1),prev=vals.at(-2)??price;
  const lo=Math.min(...vals),hi=Math.max(...vals);
  const ma7=vals.slice(-7).reduce((a,b)=>a+b,0)/Math.min(7,vals.length);
  let score=Math.max(0,Math.min(100,Math.round((1-(price-lo)/((hi-lo)||1))*100)));
  let verdict,color,bt;
  if(price<=target){verdict='🟢 到目标价了，建议出手！';color='var(--green)';bt='该换了 💷';}
  else if(score>=80){verdict='🟢 很划算，贴近近月低点';color='var(--green)';bt='划算';}
  else if(score>=55){verdict='🟡 偏低，可再等等到目标价';color='var(--yellow)';bt='再等等';}
  else{verdict='🔴 偏贵，不建议现在换';color='var(--red)';bt='偏贵';}
  const diff=price-target,dayChg=price-prev;
  document.getElementById('hero').innerHTML=`
    <div class="rate">${fmt(price)} <small>元 / 英镑</small></div>
    <div class="badge" style="background:${color};color:#10121f">${bt} · 划算度 ${score}/100</div>
    <div class="delta">较前一日 ${dayChg>=0?'▲ +':'▼ '}${fmt(dayChg)} · ${verdict}</div>
    <div class="score-wrap">
      <div class="row" style="font-size:12px;color:var(--sub)"><span>贵</span><span>划算度</span><span>划算</span></div>
      <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${color}"></div></div></div>
    <div class="grid">
      <div class="stat"><div class="k">近30天最低</div><div class="v">${fmt(lo,3)}</div></div>
      <div class="stat"><div class="k">7日均价</div><div class="v">${fmt(ma7,3)}</div></div>
      <div class="stat"><div class="k">近30天最高</div><div class="v">${fmt(hi,3)}</div></div></div>
    <div class="target-box">
      <label>我的目标价 ≤</label>
      <input id="targetInput" type="number" step="0.01" value="${target}">
      <button class="btn" onclick="saveTarget()">保存</button>
      <span style="color:var(--sub);font-size:13px">离目标还差 ${diff>0?fmt(diff)+' 元':'已到达 ✅'}</span></div>`;
}
function saveTarget(){const v=parseFloat(document.getElementById('targetInput').value);
  if(!isNaN(v)){target=v;localStorage.setItem(TARGET_KEY,v);loadHero();}}

// ---- 模型预测卡 (读 predictions.json) ----
async function loadForecast(){
  let d;
  try{d=await(await fetch('predictions.json?'+Date.now())).json();}
  catch(e){document.getElementById('forecast').innerHTML=
    '<div class="note">模型预测每日凌晨自动更新，首次部署后稍候即可看到。</div>';return;}
  document.getElementById('genLabel').textContent='数据 '+d.data_date;
  const ph=d.prob_hit,em=d.exp_min;
  const tgtNote = (Math.abs(d.target-target)>0.0001)
    ? `<div class="note">⚠️ 模型按目标 ${d.target} 计算（每日云端跑）；你网页上设的是 ${target}，概率仅供参考。改云端目标见 README。</div>`:'';
  document.getElementById('forecast').innerHTML=`
    <div class="rec">💡 ${d.recommendation}</div>
    <div class="prob">
      <div class="box"><div class="h">7天内 ≤${d.target}</div><div class="p">${Math.round(ph['7']*100)}%</div><div class="m">预期最低 ${em['7'].mean}</div></div>
      <div class="box"><div class="h">14天内 ≤${d.target}</div><div class="p">${Math.round(ph['14']*100)}%</div><div class="m">预期最低 ${em['14'].mean}</div></div>
      <div class="box"><div class="h">30天内 ≤${d.target}</div><div class="p">${Math.round(ph['30']*100)}%</div><div class="m">预期最低 ${em['30'].mean}</div></div>
    </div>${tgtNote}`;
  const bt=d.backtest;
  document.getElementById('btNote').innerHTML=
    `📊 回测(${bt.n_test}日): 80%区间实测覆盖 <b>${Math.round(bt.coverage80*100)}%</b>(目标80%) · `+
    `${d.honesty}<br>驱动: GBP/USD ${d.drivers.gbpusd} × USD/CNY ${d.drivers.usdcny} = ${d.spot}`;
  drawFan(d);
}

function drawFan(d){
  const H=d.history_tail, F=d.fan;
  const labels=H.map(x=>x.d.slice(5)).concat(F.map(x=>x.date.slice(5)));
  const hn=H.length, fn=F.length, lastH=H.at(-1).v;
  const pad=Array(hn-1).fill(null);
  const anchor=v=>pad.concat([lastH],v);  // 从最后一个实际点接上
  const histLine=H.map(x=>x.v).concat(Array(fn).fill(null));
  const p10=anchor(F.map(x=>x.p10)), p25=anchor(F.map(x=>x.p25)),
        p50=anchor(F.map(x=>x.p50)), p75=anchor(F.map(x=>x.p75)), p90=anchor(F.map(x=>x.p90));
  const tgt=labels.map(()=>d.target);
  if(fanChart)fanChart.destroy();
  fanChart=new Chart(document.getElementById('fanChart'),{
    type:'line',
    data:{labels,datasets:[
      {label:'80%区间',data:p90,borderWidth:0,pointRadius:0,fill:'+1',backgroundColor:'rgba(157,123,255,.13)'},
      {data:p10,borderWidth:0,pointRadius:0,fill:false},
      {label:'50%区间',data:p75,borderWidth:0,pointRadius:0,fill:'+1',backgroundColor:'rgba(157,123,255,.28)'},
      {data:p25,borderWidth:0,pointRadius:0,fill:false},
      {label:'预测中位',data:p50,borderColor:'#9d7bff',borderWidth:2,borderDash:[5,3],pointRadius:0,fill:false},
      {label:'实际',data:histLine,borderColor:'#ff7eb3',borderWidth:2,pointRadius:0,tension:.25,fill:false},
      {label:'目标价',data:tgt,borderColor:'#41e0a3',borderWidth:1.5,borderDash:[6,4],pointRadius:0,fill:false},
    ]},
    options:{responsive:true,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{labels:{color:'#b9aee0',boxWidth:12,filter:i=>i.text}}},
      scales:{x:{ticks:{color:'#b9aee0',maxTicksLimit:9},grid:{display:false}},
        y:{ticks:{color:'#b9aee0'},grid:{color:'rgba(255,255,255,.06)'}}}}
  });
}

loadHero(); loadForecast();
setInterval(loadHero, 10*60*1000);
</script>
</body>
</html>
